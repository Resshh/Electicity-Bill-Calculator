<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Bill Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="calculator">
        <h1>Electricity Bill Calculator</h1>
        <label for="customerName">Customer Name : </label>
        <input type="text" id="customerName" placeholder="Enter your name"> <br><br>
        <label for="unitsConsumed">Units Consumed :</label>
        <input type="number" id="unitsConsumed" placeholder="Enter units consumed"> <br><br>
        <button onclick="calculateBill()"> Calculate Bill</button>
        <button onclick="reset()" >Clear </button> <br><br>

        <div id="result">Result</div>
    </div>
    <script src="script.js">
    </script>

</body>

</html>
